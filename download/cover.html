<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');

@page {
  size: 794px 1123px;
  margin: 0;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 794px;
  height: 1123px;
  background: #ffffff;
  font-family: 'Inter', 'DejaVu Sans', sans-serif;
  overflow: hidden;
  position: relative;
}

/* Background accents */
.bg-accent {
  position: absolute;
  top: 0;
  right: 0;
  width: 45%;
  height: 100%;
  background: linear-gradient(135deg, #f0ecfa 0%, #e4dff5 100%);
  clip-path: polygon(15% 0, 100% 0, 100% 100%, 0% 100%);
}

.bg-line-v {
  position: absolute;
  top: 0;
  right: 55%;
  width: 2px;
  height: 100%;
  background: #502eb6;
  opacity: 0.15;
}

.bg-circle {
  position: absolute;
  bottom: 80px;
  right: 60px;
  width: 180px;
  height: 180px;
  border: 2px solid #502eb6;
  opacity: 0.12;
  border-radius: 50%;
}

.bg-dot {
  position: absolute;
  top: 60px;
  right: 80px;
  width: 12px;
  height: 12px;
  background: #502eb6;
  opacity: 0.3;
  border-radius: 50%;
}

.content {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  padding: 80px 70px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.kicker {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #502eb6;
  opacity: 0.7;
  margin-bottom: 20px;
}

.hero-title {
  font-size: 42px;
  font-weight: 800;
  line-height: 1.15;
  color: #202223;
  max-width: 420px;
  margin-bottom: 24px;
}

.hero-subtitle {
  font-size: 16px;
  font-weight: 300;
  line-height: 1.6;
  color: #5a6065;
  max-width: 380px;
  margin-bottom: 48px;
}

.meta-block {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.meta-item {
  font-size: 12px;
  color: #838a8f;
  font-weight: 400;
}

.meta-item span {
  color: #502eb6;
  font-weight: 600;
}

.footer-line {
  position: absolute;
  bottom: 50px;
  left: 70px;
  width: 60px;
  height: 3px;
  background: #502eb6;
  opacity: 0.5;
}

.profile-url {
  position: absolute;
  bottom: 50px;
  right: 70px;
  font-size: 11px;
  color: #838a8f;
  font-weight: 400;
}
</style>
</head>
<body>
  <div class="bg-accent"></div>
  <div class="bg-line-v"></div>
  <div class="bg-circle"></div>
  <div class="bg-dot"></div>

  <div class="content">
    <div class="kicker">GitHub Profile Audit</div>
    <div class="hero-title">Comprehensive<br>Analysis Report</div>
    <div class="hero-subtitle">
      Detailed assessment of the GitHub profile ceps12: completeness, gaps, and actionable improvement recommendations.
    </div>
    <div class="meta-block">
      <div class="meta-item">Profile: <span>ceps12</span></div>
      <div class="meta-item">Date: <span>May 2, 2026</span></div>
      <div class="meta-item">Pages: <span>11</span></div>
    </div>
  </div>

  <div class="footer-line"></div>
  <div class="profile-url">github.com/ceps12</div>
</body>
</html>
